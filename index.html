<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Dad</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Catch the Birthday Cake 🎂</h1>
    </header>

    <!-- GAME AREA -->
    <section id="game-section">
        <div id="score">Score: 0</div>

        <div id="game-area">
            <!-- Falling cakes will appear here -->
        </div>

        <div id="player">
            <!-- Player plate will go here -->
        </div>
    </section>


    <!-- BIRTHDAY CARD (hidden at first) -->
    <section id="card-section" class="hidden">
        <div id="card">
            <h2>Happy Birthday Dad</h2>
            <p id="card-message"></p>
            <button id="play-again">Play Again</button>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
