<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Dad</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Make your own birthday cake</h1>
    </header>

    <!-- GAME AREA -->
    <section id="game-section">

        <button id="start-button">Start!</button>
    
        <div id="score"></div>
        
        <div id="game-area">
            <div id="player">
                <div id="cake-stack"></div>
            </div>
        </div>
    
    </section>


    <!-- BIRTHDAY CARD (hidden at first) -->
    <section id="card-section" class="hidden">
        <div id="card">
            <h2>Happy Birthday, Dad!</h2>
            <p id="card-message">Dad,<br>Happy Birthday! I love you tons and I miss you, hope you have a good day!!</p>
            <p>Lots of Love, Jules, Zach, Ben, and Max</p>
            <p>💩 And Jasper!</p>
            <button id="play-again">Play Again!</button>
        </div>
    </section>

    <script src="script.js"></script>
    <audio id="bg-music" loop>
        <source src="happy_birthday.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
